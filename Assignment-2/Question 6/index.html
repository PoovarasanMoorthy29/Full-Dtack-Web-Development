<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Step Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .title {
            position: absolute;
            top: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Animated Box */
        .box {
            width: 80px;
            height: 80px;
            background: #FF6B6B;
            border-radius: 10px;
            animation: multiStep 4s infinite ease-in-out;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Multi-Step Animation Keyframes */
        @keyframes multiStep {
            0% {
                /* Starting position */
                transform: translateX(0) rotateZ(0deg) scale(1);
                background-color: #FF6B6B;
            }
            25% {
                /* Move */
                transform: translateX(150px) rotateZ(0deg) scale(1);
                background-color: #FF6B6B;
            }
            50% {
                /* Rotate */
                transform: translateX(150px) rotateZ(360deg) scale(1);
                background-color: #4ECDC4;
            }
            75% {
                /* Change color & Scale */
                transform: translateX(-150px) rotateZ(360deg) scale(1.3);
                background-color: #FFE66D;
            }
            100% {
                /* Return to start */
                transform: translateX(0) rotateZ(360deg) scale(1);
                background-color: #FF6B6B;
            }
        }

        /* Info Box */
        .info {
            position: absolute;
            bottom: 20px;
            color: white;
            font-size: 14px;
            line-height: 1.6;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .step {
            margin: 5px 0;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .step strong {
            color: #FFE66D;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Multi-Step Animation</h1>
        
        <div class="box"></div>

        <div class="info">
            <div class="step"><strong>0%:</strong> Starting Position</div>
            <div class="step"><strong>25%:</strong> Move Right</div>
            <div class="step"><strong>50%:</strong> Rotate 360°</div>
            <div class="step"><strong>75%:</strong> Change Color & Scale</div>
            <div class="step"><strong>100%:</strong> Return to Start</div>
        </div>
    </div>
</body>
</html>
