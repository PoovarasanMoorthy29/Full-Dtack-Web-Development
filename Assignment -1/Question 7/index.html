<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="name">Free</div>
            <div class="price">$0</div>
            <div class="box">
                <div class="free-feature">1 User</div>
                <div class="free-feature">5GB storage</div>
            </div>
                      <div class="button"><button type="button">Get start</button></div>

        </div>
        <div class="container">
            <div class="pro-name">Professional</div>
            <div class="pro-price">$50</div>
            <div class="box">
                <div class="pro-feature">10 users</div>
                <div class="pro-feature">50 GB storage</div>
                <div class="pro-feature">Web/Desktop Access</div>
                <div class="pro-feature">Ai Assistant</div>
                
            </div>
           <div class="button"><button type="button">Get start</button></div>
        </div>
        <div class="container">
            <div class="name">Enterprise</div>
            <div class="price">$100</div>
            <div class="box">
                <div class="enter-feature">25 Users</div>
                <div class="enter-feature">100 GB Storage</div>
                <div class="enter-feature">Extra 10 GB cloud storage</div>
                <div class="enter-feature">Mobile/Web/Desktop</div>
                <div class="enter-feature">Ai Assistant</div>
                
            </div>
             <div class="button"><button type="button">Get start</button></div>
        </div>
    </div>
</body>
</html>
