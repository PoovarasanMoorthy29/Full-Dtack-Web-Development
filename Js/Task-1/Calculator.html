    <script>
         const mathOperation=()=>{
            let num1=Number(prompt("Enter the num1: "));
            let num2=Number(prompt("Enter the num2: "));
            let operation=prompt("Enter the operation: ");
            if(operation=="+"){
                alert(num1+num2);
            }
            else if(operation=="-"){
                alert(num1-num2);
            }
            else if(operation=="*"){
                alert(num1 * num2);
            }
            else if(operation=="/"){
                alert(num1/num2);
            }
            else if(operation=="%"){
                alert(num1 % num2);
            }
            else {
                alert("..Please enter the correct input....");
            }
         }
         mathOperation();
    </script>
