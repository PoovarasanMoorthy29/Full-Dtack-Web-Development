<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .circle{
            height:100px;
            width:100px;
            position: relative;
            transition-delay: 5ms;
            background-color: blue;
            border-radius: 50%;  
            
        }
        @keyframes circle {
            0%{
                left:100px;
                top:0;
            }
            50%{
                left:200px
            }
            
        }
    </style>
</head>
<body>
    <div class="circle">

    </div>
    
</body>
</html>
